<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <title>Board Games</title>

    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
</head>

<body>
    <div class="menu-overlay"></div>

    <header class="header">
        <div class="container">
            <div class="header__inner">
                <a class="logo" href="#">Board Games</a>

                <button class="burger">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <nav class="nav">
                    <ul class="nav__list">
                        <li class="nav__item">
                            <a class="nav__link" href="#">Главная</a>
                        </li>
                        <li class="nav__item">
                            <a class="nav__link" href="#">Новости</a>
                        </li>
                        <li class="nav__item">
                            <a class="nav__link" href="#">О проекте</a>
                        </li>
                    </ul>
                </nav>
                <div class="header__user">
                    <a class="header__login" href="#">Войти</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div id="screen-content"></div>
    </main>
    <footer class="footer">
        <div class="container">
            <p class="footer__title">© Board Games</p>
        </div>
    </footer>

    <div class="modal">
        <div class="modal__overlay"></div>

        <div class="modal__content">
            <button class="modal__close" type="button">✕</button>

            <h2 class="modal__title">Вход</h2>

            <form class="modal__form" autocomplete="off">
                <input type="text" name="login_email" class="modal__input modal__input--email" inputmode="email"
                    autocapitalize="none" spellcheck="false" autocomplete="off">

                <input type="password" name="login_password" class="modal__input modal__input--password"
                    autocomplete="new-password">

                <p class="modal__error"></p>

                <button class="modal__submit" type="submit">Войти</button>
            </form>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>

</html>
