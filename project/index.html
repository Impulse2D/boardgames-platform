<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
    <title>Board Games</title>

    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
</head>

<body>
    <header class="header">

        <div class="container">
            <div class="header__inner">
                <a class="logo" href="#">Board Games</a>

                <button class="burger">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <nav class="nav">
                    <ul class="nav__list">
                        <li class="nav__item">
                            <a class="nav__link" href="#">Главная</a>
                        </li>
                        <li class="nav__item">
                            <a class="nav__link" href="#">Новости</a>
                        </li>
                        <li class="nav__item">
                            <a class="nav__link" href="#">О проекте</a>
                        </li>
                    </ul>
                </nav>
                <div class="header__user">
                    <a class="header__login" href="#">Войти</a>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="hero">
            <div class="container">
                <h1 class="hero__title">
                    Играй в авторские настольные игры онлайн!
                </h1>
            </div>
        </section>

        <section class="catalog">
            <div class="container">
                <div class="catalog__grid">
                    <article class="game-card">
                        <img class="game-card__img" src="images/catan.jpg" alt="Catan">
                        <div class="game-card__overlay"></div>
                        <p class="game-card__status game-card__status--classic">CLASSIC</p>
                        <p class="game-card__genre">Strategy</p>
                        <h3 class="game-card__title">Catan</h3>
                        <button class="game-card__play">Play</button>
                    </article>

                    <article class="game-card">
                        <img class="game-card__img" src="images/catan.jpg" alt="Catan">
                        <div class="game-card__overlay"></div>
                        <p class="game-card__status game-card__status--popular">POPULAR</p>
                        <p class="game-card__genre">Strategy</p>
                        <h3 class="game-card__title">Catan</h3>
                        <button class="game-card__play">Play</button>
                    </article>

                    <article class="game-card">
                        <img class="game-card__img" src="images/catan.jpg" alt="Catan">
                        <div class="game-card__overlay"></div>
                        <p class="game-card__status game-card__status--new">NEW</p>
                        <p class="game-card__genre">Strategy</p>
                        <h3 class="game-card__title">Catan</h3>
                        <button class="game-card__play">Play</button>
                    </article>

                    <article class="game-card">
                        <img class="game-card__img" src="images/catan.jpg" alt="Catan">
                        <div class="game-card__overlay"></div>
                        <p class="game-card__status game-card__status--new">NEW</p>
                        <p class="game-card__genre">Strategy</p>
                        <h3 class="game-card__title">Catan</h3>
                        <button class="game-card__play">Play</button>
                    </article>

                    <article class="game-card">
                        <img class="game-card__img" src="images/catan.jpg" alt="Catan">
                        <div class="game-card__overlay"></div>
                        <p class="game-card__status game-card__status--new">NEW</p>
                        <p class="game-card__genre">Strategy</p>
                        <h3 class="game-card__title">Catan</h3>
                        <button class="game-card__play">Play</button>
                    </article>

                    <article class="game-card">
                        <img class="game-card__img" src="images/catan.jpg" alt="Catan">
                        <div class="game-card__overlay"></div>
                        <p class="game-card__status game-card__status--new">NEW</p>
                        <p class="game-card__genre">Strategy</p>
                        <h3 class="game-card__title">Catan</h3>
                        <button class="game-card__play">Play</button>
                    </article>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="container">
            <p class="footer__title">© Board Games</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
